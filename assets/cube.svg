    0%,35%,55%,100% { opacity:1; }
    45% { opacity:0.6; }
  }
  @keyframes glowR {
    0%,55%,75%,100% { opacity:1; }
    65% { opacity:0.6; }
  }
  @keyframes glowF {
    0%,72%,92%,100% { opacity:1; }
    82% { opacity:0.6; }
  }
  .wrap {
    animation: float 3.2s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }
  .face-u { animation: glowU 5s ease-in-out infinite; }
  .face-r { animation: glowR 5s ease-in-out infinite; }
  .face-f { animation: glowF 5s ease-in-out infinite; }
</style>
